# Server-side secret scanning — the backstop for when a contributor skips
# local hooks (git commit --no-verify) or hasn't installed pre-commit.
# Runs gitleaks on every push to main and on every pull request.
name: secret-scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan commit diffs, not just the tip.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
